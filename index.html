<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Spring Bunny Hop Tour | Pinecrest & Palmetto Bay</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-stone-50 overflow-hidden">

    <nav class="fixed top-0 left-0 w-full z-[1000] bg-white/90 backdrop-blur-md border-b border-stone-200 px-6 py-3 flex justify-between items-center">
        <div>
            <h1 class="text-lg font-black tracking-tighter text-emerald-900 leading-none">SPRING BUNNY HOP</h1>
            <p class="text-[10px] text-emerald-600 font-bold tracking-widest uppercase">Sat 4/11 • 1-3 PM</p>
        </div>
        <button onclick="openLeadForm()" class="bg-emerald-600 text-white text-[10px] px-4 py-2 rounded-full font-bold shadow-lg hover:bg-emerald-700 transition-all">
            REGISTER
        </button>
    </nav>

    <div id="map" class="h-screen w-full"></div>

    <div class="fixed bottom-8 right-6 z-[1000] flex flex-col gap-3">
        <button id="locate-btn" class="bg-white text-emerald-700 p-4 rounded-full shadow-xl active:scale-90 transition-transform border border-stone-100">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
    <script>
        function openLeadForm() {
            // Placeholder for Lead Capture (e.g., Google Form or Mailchimp)
            window.open('https://forms.gle/your-form-id', '_blank');
        }
    </script>
</body>
</html>
