<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Spring Bunny Hop | Interactive Tour</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-stone-50 overflow-hidden">

    <nav class="fixed top-0 left-0 w-full z-[1000] bg-white/80 backdrop-blur-md border-b border-stone-200 px-6 py-4 flex justify-between items-center">
        <div>
            <h1 class="text-sm font-black uppercase tracking-tighter text-emerald-900">Spring Bunny Hop</h1>
            <p class="text-[10px] text-emerald-700 font-bold">OPEN HOUSE TOUR • SAT 4/11</p>
        </div>
        <div class="text-right">
            <span class="text-[10px] text-stone-400 font-mono uppercase">Pinecrest / Palmetto Bay</span>
        </div>
    </nav>

    <div id="map" class="h-screen w-full"></div>

    <button id="locate-btn" class="fixed bottom-10 right-6 z-[1000] bg-emerald-600 text-white p-4 rounded-full shadow-2xl active:scale-95 transition-transform">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
    </button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
